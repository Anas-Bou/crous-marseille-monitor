name: CROUS monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: write

concurrency:
  group: crous-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CROUS monitor once
        run: python main.py --once --no-sound
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
          DISABLE_SOUND: "true"
          AVAILABLE_RESIDENCES_FILE: available_residences_marseille.txt

      - name: Commit updated availability state
        run: |
          if [ -n "$(git status --porcelain available_residences_marseille.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add available_residences_marseille.txt
            git commit -m "Update CROUS Marseille availability"
            git push
          else
            echo "No availability changes to commit."
          fi
